name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint_and_test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Install and configure uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.27" 
          enable-cache: true

      - name: Set up Python
        run: uv python install # use version from .python-version

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest # further arguments are specified in pyproject.toml