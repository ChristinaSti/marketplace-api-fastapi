name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-22.04

    env:
      TERRAFORM_WD: terraform/pipeline
      TF_VARS: "-var-file=../common.tfvars -var-file=pipeline.tfvars"

    permissions:
      contents: read
      id-token: write

    steps:

      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.14"
      
      - name: Cache Terraform providers
        uses: actions/cache@v5
        with:
          path: ${{ env.TERRAFORM_WD }}/.terraform/providers
          key: tf-providers-${{ hashFiles(format('{0}/.terraform.lock.hcl', env.TERRAFORM_WD)) }}  
  
      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_WD }}
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform Plan
        working-directory: ${{ env.TERRAFORM_WD }}
        run: terraform plan ${{ env.TF_VARS }} -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_WD }}
        run: terraform apply  ${{ env.TF_VARS }} -auto-approve tfplan
        
      - name: Read Terraform outputs
        id: tf
        working-directory: ${{ env.TERRAFORM_WD }}
        run: |
          echo "vpc_connector=$(terraform output -raw vpc_connector_name)" >> "$GITHUB_OUTPUT"
          echo "migrate_sa=$(terraform output -raw migrate_service_account)" >> "$GITHUB_OUTPUT"
          echo "sql_connection=$(terraform output -raw cloud_sql_connection_name)" >> "$GITHUB_OUTPUT"
          echo "db_iam_migrate_user=$(terraform output -raw db_iam_migrate_user)" >> "$GITHUB_OUTPUT"
          echo "db_name=$(terraform output -raw db_name)" >> "$GITHUB_OUTPUT"
          echo "db_iam_runtime_user=$(terraform output -raw db_iam_runtime_user)" >> "$GITHUB_OUTPUT"
          echo "runtime_sa=$(terraform output -raw runtime_service_account)" >> "$GITHUB_OUTPUT"
          echo "min_instances=$(terraform output -raw cloud_run_min_instances)" >> "$GITHUB_OUTPUT"
          echo "max_instances=$(terraform output -raw cloud_run_max_instances)" >> "$GITHUB_OUTPUT"
          echo "cpu=$(terraform output -raw cloud_run_cpu)" >> "$GITHUB_OUTPUT"
          echo "memory=$(terraform output -raw cloud_run_memory)" >> "$GITHUB_OUTPUT"
          echo "concurrency=$(terraform output -raw cloud_run_concurrency)" >> "$GITHUB_OUTPUT"
          echo "timeout=$(terraform output -raw cloud_run_timeout)" >> "$GITHUB_OUTPUT"
          echo "ingress=$(terraform output -raw cloud_run_ingress)" >> "$GITHUB_OUTPUT"

      - name: Set image tag
        id: image
        run: |
          echo "base=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_SERVICE_NAME }}/${{ vars.GCP_SERVICE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build \
            -t "${{ steps.image.outputs.base }}:${{ github.sha }}" \
            -t "${{ steps.image.outputs.base }}:latest" \
            .
          docker push "${{ steps.image.outputs.base }}:${{ github.sha }}"
          docker push "${{ steps.image.outputs.base }}:latest"
    
      - name: Deploy migration job
        run: |
          gcloud run jobs deploy ${{ vars.GCP_SERVICE_NAME }}-migrate \
            --image="${{ steps.image.outputs.base }}:${{ github.sha }}" \
            --region=${{ vars.GCP_REGION }} \
            --command="alembic" \
            --args="upgrade,head" \
            --vpc-connector=${{ steps.tf.outputs.vpc_connector }} \
            --service-account=${{ steps.tf.outputs.migrate_sa }} \
            --set-env-vars="\
            DATABASE_USE_IAM_AUTH=true,\
            INSTANCE_CONNECTION_NAME=${{ steps.tf.outputs.sql_connection }},\
            DATABASE_IAM_USER=${{ steps.tf.outputs.db_iam_migrate_user }},\
            DATABASE_NAME=${{ steps.tf.outputs.db_name }},\
            DATABASE_IAM_RUNTIME_USER=${{ steps.tf.outputs.db_iam_runtime_user }}" \
            --max-retries=1 \
            --project=${{ vars.GCP_PROJECT_ID }}

      - name: Execute migration job
        run: |
          gcloud run jobs execute ${{ vars.GCP_SERVICE_NAME }}-migrate \
            --region=${{ vars.GCP_REGION }} \
            --wait \
            --project=${{ vars.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.GCP_SERVICE_NAME }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ steps.image.outputs.base }}:${{ github.sha }}
          flags: |
            --vpc-connector=${{ steps.tf.outputs.vpc_connector }}
            --service-account=${{ steps.tf.outputs.runtime_sa }}
            --min-instances=${{ steps.tf.outputs.min_instances }}
            --max-instances=${{ steps.tf.outputs.max_instances }}
            --cpu=${{ steps.tf.outputs.cpu }}
            --memory=${{ steps.tf.outputs.memory }}
            --concurrency=${{ steps.tf.outputs.concurrency }}
            --timeout=${{ steps.tf.outputs.timeout }}
            --ingress=${{ steps.tf.outputs.ingress }}
            --allow-unauthenticated
            --cpu-boost
            --execution-environment=gen2
            --startup-probe=httpGet.path=/health,periodSeconds=5,failureThreshold=3
            --liveness-probe=httpGet.path=/health,periodSeconds=30
          env_vars: |
            DATABASE_USE_IAM_AUTH=true
            INSTANCE_CONNECTION_NAME=${{ steps.tf.outputs.sql_connection }}
            DATABASE_IAM_USER=${{ steps.tf.outputs.db_iam_runtime_user }}
            DATABASE_NAME=${{ steps.tf.outputs.db_name }}

      - name: Output service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"